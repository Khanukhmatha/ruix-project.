<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruix - Daftar </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-image: url('Photos/mcpe.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b-4 border-black flex justify-between items-center px-6 py-4">
        <h1 class="text-4xl font-black tracking-tighter text-black uppercase">Ruix</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 mt-4 mb-12">
        
        <div class="text-center mb-8 bg-white/80 backdrop-blur-sm border-4 border-black px-8 py-4 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            <h2 class="text-4xl font-black mb-2 uppercase italic tracking-tight text-black">Gabung sebagai guru</h2>
            <p class="text-xl font-medium text-gray-800">Buat akun untuk mulai menyusun kuis interaktif.</p>
        </div>

        <div class="bg-white border-4 border-black p-8 w-full max-w-2xl shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] relative overflow-hidden">
            <div class="absolute top-0 right-0 w-16 h-16 bg-[#BD00FF] border-l-4 border-b-4 border-black transform translate-x-4 -translate-y-4 rotate-45"></div>

            <form id="signup-form" class="space-y-6">
                <div>
                    <label class="block font-medium text-xl uppercase mb-2 text-black tracking-tight">Nama Lengkap</label>
                    <input type="text" placeholder="Masukkan nama Anda" 
                           class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                </div>

                <div>
                    <label class="block font-medium text-xl uppercase mb-2 text-black tracking-tight">Email Sekolah</label>
                    <input type="email" placeholder="nama@sekolah.id" 
                           class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block font-medium text-xl uppercase mb-2 text-black tracking-tight">Kata Sandi</label>
                        <input type="password" placeholder="........." 
                               class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                    </div>
                    <div>
                        <label class="block font-medium text-xl uppercase mb-2 text-black tracking-tight">Konfirmasi Sandi</label>
                        <input type="password" placeholder="........." 
                               class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-[#06D6A0] text-black border-4 border-black py-4 mt-4 text-2xl font-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all uppercase tracking-widest">
                    Daftar Sekarang
                </button>
            </form>

            <div class="mt-8 pt-6 border-t-4 border-black text-center">
                <p class="text-lg font-medium text-black">Sudah punya akun guru?</p>
                <a href="signin.html" class="inline-block mt-1 text-xl font-black text-[#BD00FF] uppercase hover:underline">
                    Masuk di sini
                </a>
            </div>
        </div>

        <div class="mt-10 bg-[#FFD600] border-4 border-black p-6 w-full max-w-xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex flex-col gap-4">
            <div class="flex items-center gap-6">
                <div class="bg-white border-4 border-black p-4 shrink-0 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <span class="text-3xl">💡</span>
                </div>
                <div>
                    <p id="quote-text" class="text-lg font-medium italic text-black leading-snug">"Memuat pesan inspiratif..."</p>
                    <p id="quote-author" class="text-xs font-black text-black mt-2 uppercase tracking-tighter">— Ruix Education</p>
                </div>
            </div>
            <!-- <button onclick="fetchQuote()" class="self-end bg-black text-white px-4 py-2 font-bold text-xs uppercase shadow-[4px_4px_0px_0px_rgba(189,0,255,1)] hover:shadow-none transition-all">
                Ganti Pesan 💡
            </button> -->
        </div>
    </main>

    <!-- Footer: Ukuran Normal -->
    <footer class="bg-black text-white py-10 px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-widest mt-auto border-t-4 border-black">
        <div class="text-center md:text-left">
            <p class="text-xl mb-1 font-black text-white">Ruix</p>
            <p class="text-gray-400">© 2026 Ruix. Hak cipta milik Khanukh_Matha/Radit</p>
        </div>
        <div class="flex gap-6 text-gray-400 items-center">
            <a href="privacy.html" class="hover:text-white transition-colors">Privacy</a>
            <a href="terms.html" class="hover:text-white transition-colors">Terms</a>
            <a href="help.html" class="hovefirebaser:text-white transition-colors">Help</a>
            <div class="flex gap-2">
                <span id="btn-privacy" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">@</span>
                <span id="btn-share" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">Share</span>
            </div>
        </div>
    </footer>
<script type="module" src="script.js"></script>
</body>
</html>
