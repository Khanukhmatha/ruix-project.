<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruix - Login </title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Google: Public Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-image: url('Photos/mcpe.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <!-- Header: Sticky dengan Glassmorphism & Border Bawah -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b-4 border-black flex justify-between items-center px-6 py-4">
        <h1 class="text-4xl font-black tracking-tighter text-black uppercase">Ruix</h1>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 mt-4 mb-12">
        
        <!-- Judul Halaman: text-4xl (Bold), Subtitle: text-xl (Medium) -->
        <div class="text-center mb-8 bg-white/80 backdrop-blur-sm border-4 border-black px-8 py-4 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            <h2 class="text-4xl font-black mb-2 uppercase italic tracking-tight text-black">Area Guru</h2>
            <p class="text-xl font-medium text-gray-800">Masuk untuk mengelola kuis anggota Anda!</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white border-4 border-black p-8 w-full max-w-lg shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] relative">
            <form id="login-form" class="space-y-6">
                <!-- Input Email -->
                <div>
                    <label class="block font-medium text-xl uppercase mb-2 text-black tracking-tight">Email </label>
                    <input id="email-input" type="email" placeholder="nama@sekolah.sch.id" 
                           class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                </div>

                <!-- Input Password -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block font-medium text-xl uppercase text-black tracking-tight">Kata Sandi</label>
                        <a href="#" class="text-sm font-black text-[#BD00FF] uppercase hover:underline">Lupa sandi?</a>
                    </div>
                    <input id="password-input" type="password" placeholder="........." 
                           class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                </div>
                
                <!-- Tombol Masuk: text-2xl (Bold) -->
                <button type="submit" class="w-full bg-[#BD00FF] text-white border-4 border-black py-4 mt-4 text-2xl font-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all uppercase tracking-widest">
                    Masuk ke Dashboard
                </button>
            </form>

            <!-- Link Daftar -->
            <p class="text-center mt-8 text-sm font-bold text-black uppercase">
                Belum punya akun? <a href="signup.html" class="text-[#FF477E] hover:underline">Daftar di sini</a>
            </p>
        </div>

        <!-- Quote Box (Area Fetch API) -->
        <div class="mt-10 bg-[#FFD600] border-4 border-black p-6 w-full max-w-xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex items-center gap-6">
            <div class="bg-white border-4 border-black p-4 shrink-0 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <span class="text-3xl">💡</span>
            </div>
            <div>
                <p id="quote-text" class="text-lg font-medium italic text-black leading-snug">"Memuat pesan bijak untuk guru..."</p>
                <p id="quote-author" class="text-xs font-black text-black mt-2 uppercase tracking-tighter">— Ruix Education</p>
            </div>
        </div>
    </main>

    <!-- Footer: Ukuran Normal -->
    <footer class="bg-black text-white py-10 px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-widest mt-auto border-t-4 border-black">
        <div class="text-center md:text-left">
            <p class="text-xl mb-1 font-black text-white">Ruix</p>
            <p class="text-gray-400">© 2026 Ruix. Hak cipta milik Khanukh_Matha/Radit</p>
        </div>
        <div class="flex gap-6 text-gray-400 items-center">
            <a href="privacy.html" class="hover:text-white transition-colors">Privacy</a>
            <a href="terms.html" class="hover:text-white transition-colors">Terms</a>
            <a href="help.html" class="hover:text-white transition-colors">Help</a>
            <div class="flex gap-2">
                <span id="btn-privacy" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">@</span>
                <span id="btn-share" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">Share</span>
            </div>
        </div>
    </footer>
<script type="module" src="script.js"></script>
</body>
</html>
