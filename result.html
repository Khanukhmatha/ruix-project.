<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruix - Hasil Kuis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-image: url('Photos/mcpe.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .neo-shadow { box-shadow: 12px 12px 0px 0px rgba(0,0,0,1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <header class="sticky top-0 z-50 bg-white border-b-4 border-black px-6 py-4">
        <h1 class="text-4xl font-black tracking-tighter text-black uppercase">Ruix</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 my-12">
        
        <div class="bg-white border-4 border-black p-10 w-full max-w-lg neo-shadow text-center relative overflow-hidden">
            
            <div class="flex justify-center mb-6">
                <div class="w-32 h-32 bg-[#FFD600] border-4 border-black rounded-full flex items-center justify-center shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
                    <span class="text-6xl">🏆</span>
                </div>
            </div>

        <!-- RESULT page star display -->
        <div class="flex justify-center gap-2 mb-6 text-4xl">
            <span id="star1" class="text-gray-300">★</span>
            <span id="star2" class="text-gray-300">★</span>
            <span id="star3" class="text-gray-300">★</span>
        </div>


            <div class="mb-10">
                <h2 class="text-4xl font-black text-black uppercase">Skor Kamu: <span id="finalScoreDisplay">0</span></h2>
                <p id="congratsText" class="text-xl font-bold text-[#BD00FF] mt-2 italic">Masya Allah, Kamu Pintar!</p>
            </div>

            <a href="index.html" class="block w-full bg-[#FFD600] border-4 border-black py-4 text-2xl font-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all uppercase text-black">
                Main Lagi
            </a>
        </div>

        <div class="mt-12 bg-[#FFD600] border-4 border-black p-8 w-full max-w-2xl shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] relative">
            <div class="absolute -top-4 -right-4 bg-white border-4 border-black p-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <span class="text-3xl">📖</span>
            </div>
            <p id="quote-text" class="text-xl md:text-2xl font-black italic text-black leading-tight">
                "Memuat pesan hikmah..."
            </p>
            <p id="quote-author" class="text-sm font-bold text-black mt-4 uppercase tracking-widest">— Ruix Motivation</p>
        </div>
    </main>

    <!-- Footer: Ukuran Normal -->
    <footer class="bg-black text-white py-10 px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-widest mt-auto border-t-4 border-black">
        <div class="text-center md:text-left">
            <p class="text-xl mb-1 font-black text-white">Ruix</p>
            <p class="text-gray-400">© 2026 Ruix. Hak cipta milik Khanukh_Matha/Radit</p>
        </div>
        <div class="flex gap-6 text-gray-400 items-center">
            <a href="privacy.html" class="hover:text-white transition-colors">Privacy</a>
            <a href="terms.html" class="hover:text-white transition-colors">Terms</a>
            <a href="help.html" class="hover:text-white transition-colors">Help</a>
            <div class="flex gap-2">
                <span id="btn-privacy" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">@</span>
                <span id="btn-share" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">Share</span>
            </div>
        </div>
    </footer>
<script type="module" src="script.js"></script>
</body>
</html>
