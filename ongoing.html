<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruix - Kuis Berlangsung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-image: url('Photos/mcpe.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b-4 border-black flex justify-between items-center px-6 py-4">
        <h1 class="text-3xl md:text-4xl font-black tracking-tighter text-black uppercase">Ruix</h1>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 md:p-6 my-8">
        
        <div class="mb-8 bg-[#FFD600] border-4 border-black p-6 md:p-10 text-center shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] w-full max-w-[95%] md:max-w-xl relative">
            <p class="text-lg md:text-2xl font-black uppercase tracking-widest mb-2 text-black">PIN KUIS:</p>
            <h2 id="generatedPin" class="text-5xl sm:text-6xl md:text-8xl font-black tracking-tighter sm:tracking-normal text-black break-all">000000</h2>
            <p class="text-xs md:text-sm font-bold mt-4 uppercase italic text-black/80">Beritahu kode ini kepada kelompok siswa!</p>
        </div>



        <div class="bg-white border-4 border-black p-6 md:p-8 w-full max-w-[95%] md:max-w-2xl shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] flex flex-col md:flex-row justify-between items-center gap-6 md:gap-8 text-center md:text-left">
                <div>
                    <h2 class="text-2xl sm:text-3xl font-black text-black uppercase leading-none break-all">Kuis Berlangsung</h2>
                    <p class="text-lg md:text-xl font-bold text-[#BD00FF] uppercase mt-2">Total: <span id="totalQuestions">0</span> Soal</p>
                </div>

                <button onclick="stopQuiz()" 
                class="w-full md:w-auto bg-[#FF4D4D] text-white border-4 border-black px-8 py-4 text-lg md:text-xl font-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]
                 hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all uppercase break-all">
                    Hentikan
                </button>
        </div>

        <div class="mt-10 w-full max-w-2xl bg-white border-4 border-black p-6 shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
            <h3 class="text-xl font-black uppercase mb-4 border-b-4 border-black pb-2 flex justify-between">
                Siswa Bergabung <span id="studentCount" class="text-[#BD00FF]">0</span>
            </h3>
            
            <div id="studentList" class="flex flex-wrap gap-3">
                <p id="waitingMessage" class="text-xs font-bold uppercase italic text-gray-400">
                    Menunggu siswa bergabung di landing page...
                </p>
            </div>
        </div>
    </main>

    <!-- Footer: Ukuran Normal -->
    <footer class="bg-black text-white py-10 px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-widest mt-auto border-t-4 border-black">
        <div class="text-center md:text-left">
            <p class="text-xl mb-1 font-black text-white">Ruix</p>
            <p class="text-gray-400">© 2026 Ruix. Hak cipta milik Khanukh_Matha/Radit</p>
        </div>
        <div class="flex gap-6 text-gray-400 items-center">
            <a href="privacy.html" class="hover:text-white transition-colors">Privacy</a>
            <a href="terms.html" class="hover:text-white transition-colors">Terms</a>
            <a href="help.html" class="hover:text-white transition-colors">Help</a>
            <div class="flex gap-2">
                <span id="btn-privacy" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">@</span>
                <span id="btn-share" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">Share</span>
            </div>
        </div>
    </footer>
<script type="module" src="script.js"></script>
</body>
</html>
