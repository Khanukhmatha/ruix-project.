<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruix - Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-image: url('Photos/mcpe.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .timer-circle {
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <header class="bg-white border-b-4 border-black px-6 py-4">
        <h1 class="text-4xl font-black tracking-tighter text-black uppercase">Ruix</h1>
    </header>

    <main class="flex-grow flex flex-col items-center p-4 md:p-8">
        <div class="w-full max-w-4xl">
            
            <div class="flex justify-between items-end mb-4">
                <div class="font-black text-black uppercase">
                    <p class="text-xs">Soal</p>
                    <p class="text-2xl" id="questionCounter">0/0</p>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p id="currentPoints" class="text-2xl font-black text-[#BD00FF]">0 pts</p>
                    </div>
                    <div class="relative flex items-center justify-center w-16 h-16 bg-white border-4 border-black rounded-full shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                        <span id="timerText" class="text-2xl font-black">15</span>
                    </div>
                </div>
            </div>

            <div class="w-full bg-white border-4 border-black h-8 mb-8 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                <div id="progressBar" class="bg-[#00FF00] h-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div class="bg-white border-4 border-black p-8 md:p-12 mb-8 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] relative">
                <div class="absolute -top-4 -left-4 bg-[#FF477E] text-white px-3 py-1 border-4 border-black font-black text-xs uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    Pertanyaan
                </div>
                <h2 id="questionText" class="text-3xl md:text-5xl font-black text-black leading-tight text-center py-6">
                    Memuat soal...
                </h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="checkAnswer('A')" class="bg-[#2D9CDB] text-white border-4 border-black p-6 flex items-center gap-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">
                    <span class="bg-white text-black w-10 h-10 flex items-center justify-center border-4 border-black font-black">▲</span>
                    <span id="textOptA" class="text-xl font-black uppercase">HTTP</span>
                </button>
                <button onclick="checkAnswer('B')" class="bg-[#27AE60] text-white border-4 border-black p-6 flex items-center gap-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">
                    <span class="bg-white text-black w-10 h-10 flex items-center justify-center border-4 border-black font-black">⬟</span>
                    <span id="textOptB" class="text-xl font-black uppercase">SMTP</span>
                </button>
                <button onclick="checkAnswer('C')" class="bg-[#F2C94C] text-black border-4 border-black p-6 flex items-center gap-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">
                    <span class="bg-white text-black w-10 h-10 flex items-center justify-center border-4 border-black font-black">●</span>
                    <span id="textOptC" class="text-xl font-black uppercase">FTP</span>
                </button>
                <button onclick="checkAnswer('D')" class="bg-[#EB5757] text-white border-4 border-black p-6 flex items-center gap-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">
                    <span class="bg-white text-black w-10 h-10 flex items-center justify-center border-4 border-black font-black">■</span>
                    <span id="textOptD" class="text-xl font-black uppercase">SNMP</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer: Ukuran Normal -->
    <footer class="bg-black text-white py-10 px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-widest mt-auto border-t-4 border-black">
        <div class="text-center md:text-left">
            <p class="text-xl mb-1 font-black text-white">Ruix</p>
            <p class="text-gray-400">© 2026 Ruix. Hak cipta milik Khanukh_Matha/Radit</p>
        </div>
        <div class="flex gap-6 text-gray-400 items-center">
            <a href="privacy.html" class="hover:text-white transition-colors">Privacy</a>
            <a href="terms.html" class="hover:text-white transition-colors">Terms</a>
            <a href="help.html" class="hover:text-white transition-colors">Help</a>
            <div class="flex gap-2">
                <span id="btn-privacy" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">@</span>
                <span id="btn-share" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">Share</span>
            </div>
        </div>
    </footer>
<script type="module" src="script.js"></script>
</body>
</html>
