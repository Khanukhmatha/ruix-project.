<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruix - Siap Main?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-image: url('Photos/mcpe.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <!-- Header: Ukuran Kembali Normal (text-4xl) -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b-4 border-black flex justify-between items-center px-6 py-4">
        <h1 class="text-4xl font-black tracking-tighter text-black uppercase">Ruix</h1>
        <a href="signin.html" class="bg-[#BD00FF] text-white border-4 border-black px-6 py-2 font-bold text-sm shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">
            Area guru
        </a>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 mt-4 mb-12">
        
        <!-- Judul: Ukuran Kembali Normal (text-4xl) -->
        <div class="text-center mb-8 bg-white/80 backdrop-blur-sm border-4 border-black px-8 py-4 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            <h2 class="text-4xl font-black mb-2 uppercase italic tracking-tight text-black">SIAP MAIN?</h2>
            <!-- Tulisan Non-Bold: Ukuran Tetap Besar (text-xl) -->
            <p class="text-xl font-medium text-gray-800">Tunjukkan kehebatanmu!</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white border-4 border-black p-8 w-full max-w-md shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] relative">
            <div class="absolute -top-4 -right-4 bg-[#FF477E] text-white font-black px-4 py-1 border-4 border-black rotate-12 text-sm shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                LIVE NOW
            </div>

            <div class="space-y-6">
                <div>
                    <!-- Label Non-Bold: Ukuran Tetap Besar (text-xl) -->
                    <label class="block font-medium text-xl uppercase mb-2 text-black">Nama </label>
                    <input type="text" id="groupName" maxlength="100" placeholder="CONTOH: ALFA" 
                           class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                </div>
                <div>
                    <!-- Label Non-Bold: Ukuran Tetap Besar (text-xl) -->
                    <label class="block font-medium text-xl uppercase mb-2 text-black">Pin Kuis</label>
                    <input type="text" id="quizPin" placeholder="000000" 
                           class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white placeholder-gray-400 text-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all">
                </div>
                
                <!-- Button: Ukuran Kembali Normal (text-2xl) -->
                <button onclick="startQuiz()" class="w-full bg-[#FFD600] border-4 border-black py-4 mt-4 text-2xl font-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all uppercase flex items-center justify-center gap-3 text-black">
                    Ayo Main! 🚀
                </button>
            </div>
        </div>

        <!-- Floating Note: Font Kecil/Normal -->
        <div class="mt-12 bg-[#FFD600] border-4 border-black p-4 flex items-center gap-4 max-w-sm shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
            <span class="text-2xl">🎓</span>
            <p class="text-xs font-bold leading-tight text-black">"Platform edukasi paling berani untuk pendidik modern."</p>
        </div>

        <!-- Quote Box: Area Fetch API -->
         
        <div class="mt-10 bg-white border-4 border-black p-6 w-full max-w-lg shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            <p id="quote-text" class="text-lg font-medium italic text-black leading-snug">"Memuat motivasi untuk kelompokmu..."</p>
            <p id="quote-author" class="text-sm font-bold text-[#BD00FF] mt-2 uppercase">— Ruix System</p>
            <button onclick="fetchQuote()" class="mt-4 bg-black text-white px-4 py-2 font-bold text-xs uppercase shadow-[4px_4px_0px_0px_rgba(189,0,255,1)] hover:shadow-none transition-all">
                Ganti Pesan 💡
            </button>
        </div>
    </main>

    <!-- Footer: Ukuran Normal -->
    <footer class="bg-black text-white py-10 px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-widest mt-auto border-t-4 border-black">
        <div class="text-center md:text-left">
            <p class="text-xl mb-1 font-black text-white">Ruix</p>
            <p class="text-gray-400">© 2026 Ruix. Hak cipta milik Khanukh_Matha/Radit</p>
        </div>
        <div class="flex gap-6 text-gray-400 items-center">
            <a href="privacy.html" class="hover:text-white transition-colors">Privacy</a>
            <a href="terms.html" class="hover:text-white transition-colors">Terms</a>
            <a href="help.html" class="hover:text-white transition-colors">Help</a>
            <div class="flex gap-2">
                <span id="btn-privacy" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">@</span>
                <span id="btn-share" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">Share</span>
            </div>
        </div>
    </footer>

<script type="module" src="script.js"></script>
</body>
</html>
