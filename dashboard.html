<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruix - Buat Kuis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Public Sans', sans-serif; 
            background-image: url('Photos/mcpe.jpeg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Custom Radio Style */
        .key-selector:checked + label {
            background-color: #06D6A0;
            transform: translate(2px, 2px);
            box-shadow: none;
            color: black;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-sm border-b-4 border-black flex justify-between items-center px-6 py-4">
        <h1 class="text-4xl font-black tracking-tighter text-black uppercase">Ruix</h1>
        <div class="flex items-center gap-4">
            <span class="font-bold text-sm bg-black text-white px-3 py-1 uppercase">Mode Guru</span>
            <a href="signin.html" class="bg-[#FF477E] text-white border-4 border-black px-4 py-1 font-bold text-sm shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all">Keluar</a>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center p-6 mt-8 mb-12">
        <div class="w-full max-w-3xl">
        <div class="bg-[#BD00FF] border-4 border-black p-4 mb-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
            <h2 class="text-2xl font-black text-white uppercase italic">Menyusun Soal Nomor: <span id="questionNumber">1</span></h2>
        </div>


            <div class="bg-white border-4 border-black p-8 shadow-[12px_12px_0px_0px_rgba(0,0,0,1)]">
                <div class="space-y-8">
                    <div>
                        <label class="block font-medium text-xl uppercase mb-2 text-black">Pertanyaan</label>
                        <textarea id="questionInput" rows="3" placeholder="Masukkan pertanyaan di sini..." 
                                  class="w-full border-4 border-black p-4 font-bold text-lg focus:outline-none bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] focus:shadow-none focus:translate-x-1 focus:translate-y-1 transition-all"></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-4 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] bg-white">
                            <label class="block font-bold text-sm uppercase mb-1">Opsi A</label>
                            <input type="text" id="optA" placeholder="Ketik pilihan A" class="w-full border-2 border-black p-2 font-bold focus:outline-none">
                        </div>
                        <div class="p-4 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] bg-white">
                            <label class="block font-bold text-sm uppercase mb-1">Opsi B</label>
                            <input type="text" id="optB" placeholder="Ketik pilihan B" class="w-full border-2 border-black p-2 font-bold focus:outline-none">
                        </div>
                        <div class="p-4 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] bg-white">
                            <label class="block font-bold text-sm uppercase mb-1">Opsi C</label>
                            <input type="text" id="optC" placeholder="Ketik pilihan C" class="w-full border-2 border-black p-2 font-bold focus:outline-none">
                        </div>
                        <div class="p-4 border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] bg-white">
                            <label class="block font-bold text-sm uppercase mb-1">Opsi D</label>
                            <input type="text" id="optD" placeholder="Ketik pilihan D" class="w-full border-2 border-black p-2 font-bold focus:outline-none">
                        </div>
                    </div>

                    <div class="bg-gray-100 border-4 border-black p-6 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
                        <label class="block font-black text-xl uppercase mb-4 text-center text-black">Pilih Kunci Jawaban Benar:</label>
                        <div class="flex justify-center gap-6">
                            <div class="relative">
                                <input type="radio" name="correctKey" id="keyA" value="A" class="key-selector hidden" checked>
                                <label for="keyA" class="w-14 h-14 border-4 border-black rounded-full flex items-center justify-center font-black text-2xl cursor-pointer bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all hover:bg-gray-200">A</label>
                            </div>
                            <div class="relative">
                                <input type="radio" name="correctKey" id="keyB" value="B" class="key-selector hidden">
                                <label for="keyB" class="w-14 h-14 border-4 border-black rounded-full flex items-center justify-center font-black text-2xl cursor-pointer bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all hover:bg-gray-200">B</label>
                            </div>
                            <div class="relative">
                                <input type="radio" name="correctKey" id="keyC" value="C" class="key-selector hidden">
                                <label for="keyC" class="w-14 h-14 border-4 border-black rounded-full flex items-center justify-center font-black text-2xl cursor-pointer bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all hover:bg-gray-200">C</label>
                            </div>
                            <div class="relative">
                                <input type="radio" name="correctKey" id="keyD" value="D" class="key-selector hidden">
                                <label for="keyD" class="w-14 h-14 border-4 border-black rounded-full flex items-center justify-center font-black text-2xl cursor-pointer bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all hover:bg-gray-200">D</label>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10">
                        <button onclick="nextQuestion()" class="bg-[#FFD600] border-4 border-black py-4 text-xl font-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all uppercase flex items-center justify-center gap-2 text-black">
                            Lanjut Nomor <span id="nextBtnNum">2</span> ➔
                        </button>
                        <button onclick="finishQuiz()" class="bg-[#BD00FF] text-white border-4 border-black py-4 text-xl font-black shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all uppercase flex items-center justify-center gap-2">
                            Simpan & Selesai 💾
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-8 bg-black text-white p-4 border-4 border-black shadow-[6px_6px_0px_0px_rgba(189,0,255,1)] flex justify-between uppercase font-black text-xs italic">
                <span>Total Soal Tersimpan: <span id="savedCount">0</span></span>
                <span>Ruix Dashboard v1.1</span>
            </div>       
         </div>
    </main>

    <!-- Footer: Ukuran Normal -->
    <footer class="bg-black text-white py-10 px-6 flex flex-col md:flex-row justify-between items-center gap-6 text-[10px] font-bold uppercase tracking-widest mt-auto border-t-4 border-black">
        <div class="text-center md:text-left">
            <p class="text-xl mb-1 font-black text-white">Ruix</p>
            <p class="text-gray-400">© 2026 Ruix. Hak cipta milik Khanukh_Matha/Radit</p>
        </div>
        <div class="flex gap-6 text-gray-400 items-center">
            <a href="privacy.html" class="hover:text-white transition-colors">Privacy</a>
            <a href="terms.html" class="hover:text-white transition-colors">Terms</a>
            <a href="help.html" class="hover:text-white transition-colors">Help</a>
            <div class="flex gap-2">
                <span id="btn-privacy" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">@</span>
                <span id="btn-share" class="bg-white text-black border-2 border-white px-2 py-1 hover:bg-gray-200 cursor-pointer">Share</span>
            </div>
        </div>
    </footer>


<script type="module" src="script.js"></script>
</body>
</html>
